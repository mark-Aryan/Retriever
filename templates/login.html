{% extends 'base.html' %}
{% block title %}Login · CodeXploit Campus Desk{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔐</div>
      <h1>Welcome Back</h1>
      <p>Login with your college email or roll number to access the full system.</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Email or Roll Number</label>
        <input type="text" name="identifier" required placeholder="student@college.edu or ROLL2024001" class="form-input" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pass-wrap">
          <input type="password" name="password" required placeholder="Your password" class="form-input" id="pw" autocomplete="current-password">
          <button type="button" class="show-pw" onclick="togglePw()">👁</button>
        </div>
      </div>
      <button type="submit" class="btn-submit">Login to Campus Desk →</button>
    </form>
    <div class="auth-footer">
      Not registered yet? <a href="{{ url_for('register') }}">Create your account here</a>
    </div>
  </div>
</div>
<script>
function togglePw() { const p = document.getElementById('pw'); p.type = p.type === 'password' ? 'text' : 'password'; }
</script>
{% endblock %}
